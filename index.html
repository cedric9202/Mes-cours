<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mes Cours Particuliers</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mes Cours" />
  <meta name="theme-color" content="#1a1a2e" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #1a1a2e; color: #f0ede8; font-family: Georgia, serif; overscroll-behavior: none; }
    #app { max-width: 430px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }

    .header { background: linear-gradient(135deg, #16213e 0%, #0f3460 100%); padding: 48px 20px 16px; border-bottom: 1px solid rgba(232,200,138,0.2); }
    .header-sub { font-size: 11px; letter-spacing: 3px; color: #e8c88a; text-transform: uppercase; margin-bottom: 4px; }
    .header-title { font-size: 26px; font-weight: bold; color: #f0ede8; }
    .tabs { display: flex; gap: 8px; margin-top: 16px; }
    .tab { padding: 6px 18px; border-radius: 20px; border: 1px solid rgba(232,200,138,0.33); background: transparent; color: #e8c88a; font-size: 13px; cursor: pointer; font-family: Georgia, serif; transition: all 0.2s; }
    .tab.active { background: #e8c88a; color: #1a1a2e; font-weight: bold; }

    .month-nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: #16213e; }
    .month-btn { background: none; border: none; color: #e8c88a; font-size: 26px; cursor: pointer; padding: 0 10px; }
    .month-label { font-weight: bold; font-size: 17px; color: #f0ede8; }

    .days-header { display: grid; grid-template-columns: repeat(7, 1fr); padding: 0 10px; }
    .day-name { text-align: center; font-size: 11px; color: rgba(232,200,138,0.6); padding: 6px 0; letter-spacing: 1px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; padding: 0 10px 10px; }
    .cal-cell { min-height: 54px; border-radius: 8px; background: #16213e; border: 1px solid rgba(255,255,255,0.07); padding: 4px; cursor: pointer; transition: transform 0.1s; }
    .cal-cell:active { transform: scale(0.95); }
    .cal-cell.today { background: #0f3460; border: 1.5px solid #e8c88a; }
    .cal-day-num { font-size: 12px; color: rgba(240,237,232,0.65); margin-bottom: 2px; }
    .cal-cell.today .cal-day-num { color: #e8c88a; font-weight: bold; }
    .session-chip { border-radius: 3px; font-size: 9px; padding: 1px 3px; margin-bottom: 1px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; color: rgba(240,237,232,0.8); }
    .more-chip { font-size: 8px; color: rgba(232,200,138,0.55); }

    .summary-bar { margin: 0 10px; background: #16213e; border-radius: 12px; padding: 12px 16px; border: 1px solid rgba(232,200,138,0.13); display: flex; justify-content: space-around; }
    .sum-item { text-align: center; }
    .sum-val { font-size: 18px; font-weight: bold; }
    .sum-lbl { font-size: 10px; opacity: 0.55; margin-top: 2px; }

    /* Day panel */
    .day-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 90; display: flex; align-items: flex-end; }
    .day-panel-box { background: #16213e; border-radius: 20px 20px 0 0; padding: 20px 20px 40px; width: 100%; max-width: 430px; margin: 0 auto; max-height: 70vh; overflow-y: auto; border: 1px solid rgba(232,200,138,0.2); }
    .day-panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .day-panel-title { font-size: 17px; font-weight: bold; }
    .day-panel-sub { font-size: 11px; color: rgba(232,200,138,0.55); letter-spacing: 2px; text-transform: uppercase; }
    .day-panel-close { background: rgba(255,255,255,0.07); border: none; color: #f0ede8; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 18px; }
    .day-session-item { display: flex; align-items: center; gap: 12px; background: #0f3460; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.07); transition: transform 0.1s; }
    .day-session-item:active { transform: scale(0.98); }
    .day-session-color { width: 4px; border-radius: 4px; align-self: stretch; min-height: 40px; flex-shrink: 0; }
    .day-session-info { flex: 1; }
    .day-session-name { font-size: 15px; font-weight: bold; margin-bottom: 3px; }
    .day-session-meta { font-size: 12px; color: rgba(240,237,232,0.55); }
    .day-session-status { font-size: 18px; }
    .day-session-recur { font-size: 10px; color: #e8c88a; margin-top: 2px; }
    .day-add-btn { width: 100%; padding: 12px; border-radius: 12px; background: rgba(232,200,138,0.1); border: 1px dashed rgba(232,200,138,0.3); color: #e8c88a; font-size: 14px; cursor: pointer; font-family: Georgia, serif; margin-top: 4px; }

    /* Stats */
    .stats-view { padding: 16px 14px; }
    .section-label { font-size: 12px; color: rgba(232,200,138,0.55); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .stat-card { background: #16213e; border-radius: 12px; padding: 14px; }
    .stat-val { font-size: 24px; font-weight: bold; }
    .stat-lbl { font-size: 11px; color: rgba(240,237,232,0.55); margin-top: 2px; }
    .student-card { background: #16213e; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.07); }
    .student-top { display: flex; justify-content: space-between; align-items: center; }
    .student-name { font-weight: bold; font-size: 15px; }
    .student-meta { font-size: 12px; color: #e8c88a; }
    .student-amounts { display: flex; gap: 16px; margin-top: 6px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: flex-end; }
    .modal-box { background: #16213e; border-radius: 20px 20px 0 0; padding: 24px 20px 50px; width: 100%; max-width: 430px; margin: 0 auto; border: 1px solid rgba(232,200,138,0.2); max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-sub { font-size: 10px; color: rgba(232,200,138,0.55); letter-spacing: 2px; text-transform: uppercase; }
    .modal-title { font-size: 17px; font-weight: bold; }
    .modal-close { background: rgba(255,255,255,0.07); border: none; color: #f0ede8; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 11px; color: rgba(232,200,138,0.55); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
    .form-input { width: 100%; background: #0f3460; border: 1px solid rgba(255,255,255,0.13); border-radius: 10px; padding: 10px 12px; color: #f0ede8; font-size: 14px; font-family: Georgia, serif; outline: none; }
    .option-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .opt-btn { flex: 1; min-width: 60px; padding: 8px 6px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.13); background: transparent; color: rgba(240,237,232,0.65); font-size: 12px; cursor: pointer; font-family: Georgia, serif; transition: all 0.15s; text-align: center; }
    .opt-btn.active { border: 1.5px solid #e8c88a; background: rgba(232,200,138,0.13); color: #e8c88a; }
    .rate-row { display: flex; align-items: center; gap: 10px; }
    .rate-val { font-size: 16px; font-weight: bold; color: #e8c88a; min-width: 56px; text-align: right; }
    input[type=range] { flex: 1; accent-color: #e8c88a; }
    input[type=time] { color-scheme: dark; }
    .color-dots { display: flex; gap: 8px; }
    .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border 0.15s; }
    .color-dot.active { border: 3px solid white; }
    .status-row { display: flex; gap: 10px; margin-top: 4px; }
    .status-btn { flex: 1; padding: 10px; border-radius: 10px; background: transparent; font-size: 13px; cursor: pointer; font-family: Georgia, serif; transition: all 0.15s; }
    .btn-save { width: 100%; margin-top: 6px; padding: 14px; border-radius: 12px; background: linear-gradient(135deg, #e8c88a, #d4a843); border: none; color: #1a1a2e; font-weight: bold; font-size: 15px; cursor: pointer; font-family: Georgia, serif; }
    .btn-delete { width: 100%; margin-top: 8px; padding: 10px; border-radius: 12px; background: transparent; border: 1px solid rgba(241,148,138,0.27); color: #F1948A; font-size: 13px; cursor: pointer; font-family: Georgia, serif; }
    .btn-secondary { width: 100%; margin-top: 8px; padding: 10px; border-radius: 12px; background: transparent; border: 1px solid rgba(232,200,138,0.3); color: #e8c88a; font-size: 13px; cursor: pointer; font-family: Georgia, serif; }
    .empty-msg { color: rgba(240,237,232,0.27); font-size: 13px; text-align: center; padding: 20px; }
    .hidden { display: none; }
    .recur-info { background: rgba(232,200,138,0.08); border: 1px solid rgba(232,200,138,0.2); border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #e8c88a; margin-top: 6px; }

    /* Scope modal */
    .scope-box { background: #16213e; border-radius: 20px 20px 0 0; padding: 24px 20px 50px; width: 100%; max-width: 430px; margin: 0 auto; border: 1px solid rgba(232,200,138,0.2); }
    .scope-title { font-size: 17px; font-weight: bold; margin-bottom: 6px; }
    .scope-sub { font-size: 13px; color: rgba(240,237,232,0.55); margin-bottom: 20px; }
    .scope-btn { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.13); background: #0f3460; color: #f0ede8; font-size: 14px; cursor: pointer; font-family: Georgia, serif; margin-bottom: 10px; text-align: left; }
    .scope-btn:active { background: rgba(232,200,138,0.15); }
    .scope-cancel { width: 100%; padding: 12px; border-radius: 12px; border: none; background: transparent; color: rgba(240,237,232,0.4); font-size: 13px; cursor: pointer; font-family: Georgia, serif; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-sub">Mes cours particuliers</div>
    <div class="header-title">Agenda &amp; Suivi</div>
    <div class="tabs">
      <button class="tab active" id="tab-calendar" onclick="setView('calendar')">📅 Calendrier</button>
      <button class="tab" id="tab-stats" onclick="setView('stats')">📊 Bilan</button>
    </div>
  </div>

  <div id="view-calendar">
    <div class="month-nav">
      <button class="month-btn" onclick="prevMonth()">‹</button>
      <div class="month-label" id="month-label"></div>
      <button class="month-btn" onclick="nextMonth()">›</button>
    </div>
    <div class="days-header">
      <div class="day-name">Lun</div><div class="day-name">Mar</div><div class="day-name">Mer</div>
      <div class="day-name">Jeu</div><div class="day-name">Ven</div><div class="day-name">Sam</div>
      <div class="day-name">Dim</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="summary-bar" id="summary-bar"></div>
  </div>

  <div id="view-stats" class="stats-view hidden">
    <div class="section-label" id="stats-title"></div>
    <div class="stat-grid" id="stat-grid"></div>
    <div class="section-label">Par élève</div>
    <div id="student-list"></div>
  </div>
</div>

<!-- Day panel -->
<div class="day-panel hidden" id="day-panel" onclick="closeDayPanelOutside(event)">
  <div class="day-panel-box">
    <div class="day-panel-header">
      <div>
        <div class="day-panel-sub">Cours du jour</div>
        <div class="day-panel-title" id="day-panel-title"></div>
      </div>
      <button class="day-panel-close" onclick="closeDayPanel()">×</button>
    </div>
    <div id="day-session-list"></div>
    <button class="day-add-btn" onclick="openNewFromPanel()">+ Ajouter un cours</button>
  </div>
</div>

<!-- Scope modal (this only / all series) -->
<div class="modal-overlay hidden" id="scope-modal">
  <div class="scope-box">
    <div class="scope-title">Cours récurrent</div>
    <div class="scope-sub">Que souhaitez-vous modifier ?</div>
    <button class="scope-btn" onclick="scopeChoice('one')">✏️ &nbsp; Seulement ce cours-là</button>
    <button class="scope-btn" onclick="scopeChoice('all')">🔁 &nbsp; Toute la série de cours</button>
    <button class="scope-cancel" onclick="closeScopeModal()">Annuler</button>
  </div>
</div>

<!-- Main modal -->
<div class="modal-overlay hidden" id="modal" onclick="closeModalOutside(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <div class="modal-sub" id="modal-sub">Nouveau cours</div>
        <div class="modal-title" id="modal-date"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-group">
      <div class="form-label">Élève</div>
      <input class="form-input" id="f-student" placeholder="Nom de l'élève" />
    </div>
    <div class="form-group">
      <div class="form-label">Heure</div>
      <input class="form-input" type="time" id="f-time" value="14:00" />
    </div>
    <div class="form-group">
      <div class="form-label">Durée (heures)</div>
      <div class="option-btns" id="dur-btns"></div>
    </div>
    <div class="form-group">
      <div class="form-label" id="rate-label">Tarif horaire — Total : 30€</div>
      <div class="rate-row">
        <input type="range" min="10" max="100" step="5" value="30" id="f-rate" oninput="updateRate()" />
        <div class="rate-val" id="rate-display">30€/h</div>
      </div>
    </div>
    <div class="form-group">
      <div class="form-label">Récurrence</div>
      <div class="option-btns" id="recur-btns"></div>
      <div class="recur-info hidden" id="recur-info"></div>
    </div>
    <div class="form-group">
      <div class="form-label">Couleur</div>
      <div class="color-dots" id="color-dots"></div>
    </div>
    <div class="form-group">
      <div class="form-label">Note (optionnel)</div>
      <input class="form-input" id="f-note" placeholder="Commentaire..." />
    </div>
    <div class="status-row">
      <button class="status-btn" id="btn-paid" onclick="toggleStatus('paid')">✓ Réglé</button>
      <button class="status-btn" id="btn-carried" onclick="toggleStatus('carried')">↷ Reporté</button>
    </div>
    <button class="btn-save" id="btn-save" onclick="saveSession()">Ajouter le cours</button>
    <button class="btn-delete hidden" id="btn-delete" onclick="confirmDelete()">Supprimer ce cours</button>
  </div>
</div>

<script>
const MONTHS = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const DAYS_LONG = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
const COLORS = ["#E8A87C","#85C1E9","#A9DFBF","#F1948A","#C39BD3","#F9E79F","#AED6F1"];
const DURATIONS = [0.5,1,1.5,2,2.5,3];
const RECURRENCES = [
  {key:"none", label:"Aucune"},
  {key:"weekly", label:"Hebdo"},
  {key:"biweekly", label:"Bi-mens."},
];

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let currentView = "calendar";
let selectedDay = null;
let editId = null;
let editScope = null; // 'one' or 'all'
let pendingEditSession = null; // session waiting for scope choice
let formState = { duration: 1, color: COLORS[0], paid: false, carried: false, recurrence: "none" };

function getSessions() {
  try { return JSON.parse(localStorage.getItem("cpSessions") || "{}"); } catch { return {}; }
}
function saveSessions(s) {
  try { localStorage.setItem("cpSessions", JSON.stringify(s)); } catch {}
}
function dateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function getDaysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }
function getFirstDay(y, m) { let d = new Date(y,m,1).getDay(); return d===0?6:d-1; }

// Generate all dates for a recurring session starting from a given date
function generateRecurringDates(startY, startM, startD, recurrence, weeksAhead) {
  const dates = [];
  if (recurrence === "none") return dates;
  const interval = recurrence === "weekly" ? 7 : 14;
  let date = new Date(startY, startM, startD);
  for (let i = 0; i < weeksAhead; i++) {
    date = new Date(date.getTime() + interval * 24 * 60 * 60 * 1000);
    dates.push({ y: date.getFullYear(), m: date.getMonth(), d: date.getDate() });
  }
  return dates;
}

function setView(v) {
  currentView = v;
  document.getElementById("view-calendar").classList.toggle("hidden", v !== "calendar");
  document.getElementById("view-stats").classList.toggle("hidden", v !== "stats");
  document.getElementById("tab-calendar").classList.toggle("active", v === "calendar");
  document.getElementById("tab-stats").classList.toggle("active", v === "stats");
  if (v === "stats") renderStats(); else renderCalendar();
}

function prevMonth() {
  if (currentMonth === 0) { currentMonth = 11; currentYear--; } else currentMonth--;
  renderCalendar();
}
function nextMonth() {
  if (currentMonth === 11) { currentMonth = 0; currentYear++; } else currentMonth++;
  renderCalendar();
}

function renderCalendar() {
  const today = new Date();
  document.getElementById("month-label").textContent = MONTHS[currentMonth] + " " + currentYear;
  const sessions = getSessions();
  const days = getDaysInMonth(currentYear, currentMonth);
  const firstDay = getFirstDay(currentYear, currentMonth);
  let html = "";
  for (let i = 0; i < firstDay; i++) html += "<div></div>";
  for (let d = 1; d <= days; d++) {
    const key = dateKey(currentYear, currentMonth, d);
    const daySessions = sessions[key] || [];
    const isToday = d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear();
    html += `<div class="cal-cell${isToday?' today':''}" onclick="openDayPanel(${d})">`;
    html += `<div class="cal-day-num">${d}</div>`;
    daySessions.slice(0,2).forEach(s => {
      const icon = s.paid ? "✓" : s.carried ? "↷" : "○";
      html += `<div class="session-chip" style="background:${s.color}33;border-left:2px solid ${s.color}">${icon} ${s.studentName}</div>`;
    });
    if (daySessions.length > 2) html += `<div class="more-chip">+${daySessions.length-2}</div>`;
    html += "</div>";
  }
  document.getElementById("cal-grid").innerHTML = html;

  const allForMonth = Object.entries(sessions)
    .filter(([k]) => k.startsWith(`${currentYear}-${String(currentMonth+1).padStart(2,'0')}`))
    .flatMap(([,arr]) => arr);
  const earned = allForMonth.reduce((a,s)=> a+(s.paid?s.duration*s.hourlyRate:0),0);
  const pending = allForMonth.reduce((a,s)=> a+(!s.paid&&!s.carried?s.duration*s.hourlyRate:0),0);
  const carried = allForMonth.reduce((a,s)=> a+(s.carried?s.duration*s.hourlyRate:0),0);
  const hours = allForMonth.reduce((a,s)=> a+s.duration,0);
  document.getElementById("summary-bar").innerHTML = `
    <div class="sum-item"><div class="sum-val" style="color:#A9DFBF">${earned}€</div><div class="sum-lbl" style="color:#A9DFBF">Encaissé</div></div>
    <div class="sum-item"><div class="sum-val" style="color:#F1948A">${pending}€</div><div class="sum-lbl" style="color:#F1948A">En attente</div></div>
    <div class="sum-item"><div class="sum-val" style="color:#e8c88a">${carried}€</div><div class="sum-lbl" style="color:#e8c88a">Reporté</div></div>
    <div class="sum-item"><div class="sum-val" style="color:#85C1E9">${hours}h</div><div class="sum-lbl" style="color:#85C1E9">Cours</div></div>`;
}

// Day panel
function openDayPanel(day) {
  selectedDay = day;
  const sessions = getSessions();
  const key = dateKey(currentYear, currentMonth, day);
  const daySessions = sessions[key] || [];
  const dow = new Date(currentYear, currentMonth, day).getDay();
  const dowFr = dow === 0 ? 6 : dow - 1;
  document.getElementById("day-panel-title").textContent = `${DAYS_LONG[dowFr]} ${day} ${MONTHS[currentMonth]}`;
  let html = "";
  if (daySessions.length === 0) {
    html = `<div class="empty-msg">Aucun cours ce jour</div>`;
  } else {
    daySessions.forEach(s => {
      const icon = s.paid ? "✅" : s.carried ? "↷" : "⏳";
      const recurLabel = s.recurrence === "weekly" ? "🔁 Hebdomadaire" : s.recurrence === "biweekly" ? "🔁 Bi-mensuel" : "";
      html += `<div class="day-session-item" onclick="openEditFromPanel('${s.id}')">
        <div class="day-session-color" style="background:${s.color}"></div>
        <div class="day-session-info">
          <div class="day-session-name">${s.studentName}</div>
          <div class="day-session-meta">${s.time || ''} · ${s.duration}h · ${s.duration * s.hourlyRate}€</div>
          ${recurLabel ? `<div class="day-session-recur">${recurLabel}</div>` : ''}
          ${s.note ? `<div style="font-size:11px;color:rgba(240,237,232,0.4);margin-top:2px">${s.note}</div>` : ''}
        </div>
        <div class="day-session-status">${icon}</div>
      </div>`;
    });
  }
  document.getElementById("day-session-list").innerHTML = html;
  document.getElementById("day-panel").classList.remove("hidden");
}

function closeDayPanel() { document.getElementById("day-panel").classList.add("hidden"); }
function closeDayPanelOutside(e) { if (e.target.id === "day-panel") closeDayPanel(); }

function openNewFromPanel() {
  closeDayPanel();
  openNew(selectedDay);
}

function openEditFromPanel(id) {
  const sessions = getSessions();
  const key = dateKey(currentYear, currentMonth, selectedDay);
  const s = (sessions[key]||[]).find(x => x.id == id);
  if (!s) return;
  closeDayPanel();
  // If recurring, ask scope first
  if (s.recurrence && s.recurrence !== "none") {
    pendingEditSession = s;
    document.getElementById("scope-modal").classList.remove("hidden");
  } else {
    openEditDirect(s, 'one');
  }
}

function closeScopeModal() {
  document.getElementById("scope-modal").classList.add("hidden");
  pendingEditSession = null;
}

function scopeChoice(scope) {
  document.getElementById("scope-modal").classList.add("hidden");
  if (pendingEditSession) {
    openEditDirect(pendingEditSession, scope);
    pendingEditSession = null;
  }
}

function openNew(day) {
  selectedDay = day; editId = null; editScope = null;
  const sessions = getSessions();
  const total = Object.values(sessions).flat().length;
  formState = { duration: 1, color: COLORS[total % COLORS.length], paid: false, carried: false, recurrence: "none" };
  document.getElementById("f-student").value = "";
  document.getElementById("f-time").value = "14:00";
  document.getElementById("f-rate").value = 30;
  document.getElementById("f-note").value = "";
  document.getElementById("modal-sub").textContent = "Nouveau cours";
  const dow = new Date(currentYear, currentMonth, day).getDay();
  const dowFr = dow === 0 ? 6 : dow - 1;
  document.getElementById("modal-date").textContent = `${DAYS_LONG[dowFr]} ${day} ${MONTHS[currentMonth]}`;
  document.getElementById("btn-save").textContent = "Ajouter le cours";
  document.getElementById("btn-delete").classList.add("hidden");
  buildModalUI(); updateRate(); updateRecurInfo();
  document.getElementById("modal").classList.remove("hidden");
}

function openEditDirect(s, scope) {
  selectedDay = selectedDay; editId = s.id; editScope = scope;
  formState = { duration: s.duration, color: s.color, paid: s.paid, carried: s.carried, recurrence: s.recurrence || "none" };
  document.getElementById("f-student").value = s.studentName;
  document.getElementById("f-time").value = s.time || "14:00";
  document.getElementById("f-rate").value = s.hourlyRate;
  document.getElementById("f-note").value = s.note || "";
  document.getElementById("modal-sub").textContent = scope === 'all' ? "Modifier toute la série" : "Modifier ce cours";
  const dow = new Date(currentYear, currentMonth, selectedDay).getDay();
  const dowFr = dow === 0 ? 6 : dow - 1;
  document.getElementById("modal-date").textContent = `${DAYS_LONG[dowFr]} ${selectedDay} ${MONTHS[currentMonth]}`;
  document.getElementById("btn-save").textContent = "Mettre à jour";
  document.getElementById("btn-delete").classList.remove("hidden");
  buildModalUI(); updateRate(); updateRecurInfo();
  document.getElementById("modal").classList.remove("hidden");
}

function closeModal() { document.getElementById("modal").classList.add("hidden"); }
function closeModalOutside(e) { if (e.target.id === "modal") closeModal(); }

function buildModalUI() {
  let durHtml = "";
  DURATIONS.forEach(v => {
    durHtml += `<button class="opt-btn${formState.duration===v?' active':''}" onclick="setDuration(${v})">${v}h</button>`;
  });
  document.getElementById("dur-btns").innerHTML = durHtml;

  let recurHtml = "";
  RECURRENCES.forEach(r => {
    recurHtml += `<button class="opt-btn${formState.recurrence===r.key?' active':''}" onclick="setRecurrence('${r.key}')">${r.label}</button>`;
  });
  document.getElementById("recur-btns").innerHTML = recurHtml;

  let colorHtml = "";
  COLORS.forEach(c => {
    colorHtml += `<div class="color-dot${formState.color===c?' active':''}" style="background:${c}" onclick="setColor('${c}')"></div>`;
  });
  document.getElementById("color-dots").innerHTML = colorHtml;

  styleStatusBtn("btn-paid", formState.paid, "#A9DFBF");
  styleStatusBtn("btn-carried", formState.carried, "#e8c88a");
}

function styleStatusBtn(id, active, color) {
  const btn = document.getElementById(id);
  btn.style.border = `1.5px solid ${active ? color : 'rgba(255,255,255,0.13)'}`;
  btn.style.color = active ? color : 'rgba(240,237,232,0.55)';
  btn.style.background = active ? color+'22' : 'transparent';
  btn.style.fontWeight = active ? 'bold' : 'normal';
}

function setDuration(v) {
  formState.duration = v;
  document.querySelectorAll("#dur-btns .opt-btn").forEach(b => b.classList.toggle("active", parseFloat(b.textContent)===v));
  updateRate();
}

function setRecurrence(r) {
  formState.recurrence = r;
  document.querySelectorAll("#recur-btns .opt-btn").forEach((b,i) => b.classList.toggle("active", RECURRENCES[i].key===r));
  updateRecurInfo();
}

function updateRecurInfo() {
  const info = document.getElementById("recur-info");
  if (formState.recurrence === "none") { info.classList.add("hidden"); return; }
  const label = formState.recurrence === "weekly" ? "toutes les semaines" : "toutes les 2 semaines";
  info.textContent = `🔁 Ce cours sera créé automatiquement ${label} pendant 6 mois.`;
  info.classList.remove("hidden");
}

function setColor(c) {
  formState.color = c;
  document.querySelectorAll(".color-dot").forEach(d => {
    d.classList.toggle("active", d.getAttribute('onclick') === `setColor('${c}')`);
  });
}

function updateRate() {
  const rate = parseInt(document.getElementById("f-rate").value);
  const total = (formState.duration * rate).toFixed(0);
  document.getElementById("rate-display").textContent = rate + "€/h";
  document.getElementById("rate-label").textContent = `Tarif horaire — Total : ${total}€`;
}

function toggleStatus(type) {
  if (type === 'paid') { formState.paid = !formState.paid; if (formState.paid) formState.carried = false; }
  else { formState.carried = !formState.carried; if (formState.carried) formState.paid = false; }
  styleStatusBtn("btn-paid", formState.paid, "#A9DFBF");
  styleStatusBtn("btn-carried", formState.carried, "#e8c88a");
}

function saveSession() {
  const name = document.getElementById("f-student").value.trim();
  if (!name) { document.getElementById("f-student").focus(); return; }
  const sessions = getSessions();
  const key = dateKey(currentYear, currentMonth, selectedDay);
  const arr = sessions[key] ? [...sessions[key]] : [];
  const seriesId = (editId && editScope === 'all') ? 
    ((sessions[key]||[]).find(s=>s.id==editId)||{}).seriesId || Date.now() 
    : (!editId && formState.recurrence !== 'none') ? Date.now() : null;

  const newS = {
    id: editId || Date.now(),
    studentName: name,
    time: document.getElementById("f-time").value,
    duration: formState.duration,
    hourlyRate: parseInt(document.getElementById("f-rate").value),
    color: formState.color,
    paid: formState.paid,
    carried: formState.carried,
    recurrence: formState.recurrence,
    note: document.getElementById("f-note").value,
    seriesId: seriesId
  };

  if (editId) {
    if (editScope === 'all') {
      // Update all sessions with same seriesId
      const sid = ((sessions[key]||[]).find(s=>s.id==editId)||{}).seriesId;
      if (sid) {
        Object.keys(sessions).forEach(k => {
          sessions[k] = sessions[k].map(s => s.seriesId === sid ? {
            ...s, studentName: newS.studentName, time: newS.time,
            duration: newS.duration, hourlyRate: newS.hourlyRate,
            color: newS.color, recurrence: newS.recurrence, note: newS.note
          } : s);
        });
      }
    } else {
      // Update only this one
      const idx = arr.findIndex(s => s.id == editId);
      if (idx >= 0) arr[idx] = { ...newS, seriesId: undefined }; else arr.push(newS);
      sessions[key] = arr;
    }
  } else {
    arr.push(newS);
    sessions[key] = arr;
    // Create recurring instances
    if (formState.recurrence !== 'none') {
      const weeks = formState.recurrence === 'weekly' ? 26 : 13;
      const dates = generateRecurringDates(currentYear, currentMonth, selectedDay, formState.recurrence, weeks);
      dates.forEach(({y,m,d}) => {
        const k = dateKey(y,m,d);
        if (!sessions[k]) sessions[k] = [];
        sessions[k].push({ ...newS, id: Date.now() + Math.random(), paid: false, carried: false });
      });
    }
  }

  saveSessions(sessions);
  closeModal();
  renderCalendar();
}

function confirmDelete() {
  const sessions = getSessions();
  const key = dateKey(currentYear, currentMonth, selectedDay);
  const s = (sessions[key]||[]).find(x => x.id == editId);
  if (s && s.seriesId && editScope === 'all') {
    // Delete all in series
    Object.keys(sessions).forEach(k => {
      sessions[k] = sessions[k].filter(x => x.seriesId !== s.seriesId);
    });
  } else {
    sessions[key] = (sessions[key]||[]).filter(x => x.id != editId);
  }
  saveSessions(sessions);
  closeModal();
  renderCalendar();
}

function renderStats() {
  const sessions = getSessions();
  const allForMonth = Object.entries(sessions)
    .filter(([k]) => k.startsWith(`${currentYear}-${String(currentMonth+1).padStart(2,'0')}`))
    .flatMap(([,arr]) => arr);
  document.getElementById("stats-title").textContent = `Bilan — ${MONTHS[currentMonth]} ${currentYear}`;
  const earned = allForMonth.reduce((a,s)=> a+(s.paid?s.duration*s.hourlyRate:0),0);
  const pending = allForMonth.reduce((a,s)=> a+(!s.paid&&!s.carried?s.duration*s.hourlyRate:0),0);
  const carried = allForMonth.reduce((a,s)=> a+(s.carried?s.duration*s.hourlyRate:0),0);
  const hours = allForMonth.reduce((a,s)=> a+s.duration,0);
  document.getElementById("stat-grid").innerHTML = [
    {label:"Encaissé",val:`${earned}€`,color:"#A9DFBF"},
    {label:"En attente",val:`${pending}€`,color:"#F1948A"},
    {label:"Reporté",val:`${carried}€`,color:"#e8c88a"},
    {label:"Heures totales",val:`${hours}h`,color:"#85C1E9"},
  ].map(i=>`<div class="stat-card" style="border:1px solid ${i.color}33"><div class="stat-val" style="color:${i.color}">${i.val}</div><div class="stat-lbl">${i.label}</div></div>`).join("");

  const studentMap = {};
  allForMonth.forEach(s => {
    if (!studentMap[s.studentName]) studentMap[s.studentName] = {sessions:0,hours:0,earned:0,pending:0};
    studentMap[s.studentName].sessions++;
    studentMap[s.studentName].hours += s.duration;
    if (s.paid) studentMap[s.studentName].earned += s.duration*s.hourlyRate;
    else studentMap[s.studentName].pending += s.duration*s.hourlyRate;
  });
  const entries = Object.entries(studentMap);
  document.getElementById("student-list").innerHTML = entries.length === 0
    ? `<div class="empty-msg">Aucun cours ce mois-ci</div>`
    : entries.map(([name,data])=>`
      <div class="student-card">
        <div class="student-top">
          <div class="student-name">${name}</div>
          <div class="student-meta">${data.sessions} séance${data.sessions>1?'s':''} · ${data.hours}h</div>
        </div>
        <div class="student-amounts">
          <div style="font-size:12px;color:#A9DFBF">✓ ${data.earned}€ encaissé</div>
          ${data.pending>0?`<div style="font-size:12px;color:#F1948A">○ ${data.pending}€ en attente</div>`:''}
        </div>
      </div>`).join("");
}

renderCalendar();
</script>
